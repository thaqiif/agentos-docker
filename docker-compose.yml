services:
  agent-os:
    build:
      context: .
      args:
        # Bake the configured Claude profiles into the UI's harness list.
        # Read from .env so it stays the single source of truth.
        CLAUDE_PROFILES: ${CLAUDE_PROFILES:-a b c}
        # Terminal font size (px). Compiled into the client bundle, so changing
        # these needs a rebuild: `docker compose up -d --build`.
        TERMINAL_FONT_SIZE: ${TERMINAL_FONT_SIZE:-16}
        TERMINAL_FONT_SIZE_MOBILE: ${TERMINAL_FONT_SIZE_MOBILE:-13}
        # Install Docker CLI inside the container so agents can talk to the
        # host Docker daemon via the mounted socket. Set to "true" to enable.
        ENABLE_DOCKER: ${ENABLE_DOCKER:-true}
        # Upstream AgentOS is pinned to a commit SHA in the Dockerfile so our
        # build-time patches stay in sync. Override here to build a different
        # commit SHA, tag, or branch (e.g. to try the latest):
        # AGENT_OS_REF: main
        # Which AI coding agents to bake in (all default to true). Set any to
        # false in .env to skip installing that CLI and shrink the image.
        INSTALL_CLAUDE_CODE: ${INSTALL_CLAUDE_CODE:-true}
        INSTALL_CODEX: ${INSTALL_CODEX:-true}
        INSTALL_OPENCODE: ${INSTALL_OPENCODE:-true}
        INSTALL_COMMAND_CODE: ${INSTALL_COMMAND_CODE:-true}
        INSTALL_ZERO: ${INSTALL_ZERO:-true}
        # Bake in a headless Chromium (+ system libs) so agents can render and
        # screenshot frontends. Adds a few hundred MB; set false to skip it.
        INSTALL_BROWSER: ${INSTALL_BROWSER:-true}
        # Optional components (all default to true). Set false in .env to skip.
        INSTALL_GH: ${INSTALL_GH:-true}                                 # GitHub CLI (gh)
        INSTALL_JETBRAINS_MONO_FONT: ${INSTALL_JETBRAINS_MONO_FONT:-true} # self-hosted code font
        INSTALL_AUTOPILOT: ${INSTALL_AUTOPILOT:-true}                   # autopilot-multi TDD workflow
    restart: unless-stopped

    # Optional: pass extra env (e.g. agent API keys) into the container.
    env_file:
      - path: .env
        required: false

    environment:
      AGENT_OS_PORT: 3011
      SHELL: /bin/bash
      # Run the container as your host user so files on the mounted /workspaces
      # are read/writable. Set PUID/PGID in .env to match `id` on the host.
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      # CLAUDE_PROFILES (extra Claude Code logins) is configured in .env so you
      # can add/remove profiles without touching this file or rebuilding.

    ports:
      # Exposed on all interfaces by default — see the security note in README.
      # For a safer default, bind to localhost: "127.0.0.1:3011:3011"
      - "3011:3011"

    volumes:
      # Persist the whole home directory in one volume. Each agent CLI scatters
      # its auth/state across different home paths — Claude in ~/.claude AND the
      # loose ~/.claude.json, OpenCode in ~/.local/share/opencode, Codex in
      # ~/.codex, git in ~/.gitstate, etc. Mounting all of $HOME persists every
      # login at once instead of whack-a-mole per-tool volumes. Build artifacts
      # live in /opt (outside home), so nothing important is shadowed.
      - agent_os_home:/home/agent
      - ${WORKSPACE_DIR:-/developer}:/workspaces

      # Mount the host Docker socket so agents can run docker commands.
      # Controlled by the DOCKER_HOST_SOCKET env var (default /dev/null = off).
      # Set it to /var/run/docker.sock in .env (alongside ENABLE_DOCKER=true).
      # WARNING: this gives the agent full control over Docker on your server.
      - ${DOCKER_HOST_SOCKET:-/dev/null}:/var/run/docker.sock:ro

volumes:
  agent_os_home:
